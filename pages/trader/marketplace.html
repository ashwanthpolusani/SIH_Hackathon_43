<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Marketplace — browse live crop listings with prices, quantities, and locations on FarmConnect.">
  <title>Marketplace – FarmConnect</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌾</text></svg>">
  <link rel="stylesheet" href="../../css/global.css">
  <style>
    body { background-color: var(--color-bg); padding-bottom: calc(var(--footer-height) + var(--space-4)); }

    .market-controls {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
      flex-wrap: wrap;
    }

    .sort-btn {
      padding: var(--space-2) var(--space-4);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-full);
      background-color: var(--color-surface);
      font-size: var(--text-sm);
      font-family: var(--font-body);
      cursor: pointer;
      color: var(--color-text-secondary);
      transition: all var(--transition-fast);
    }

    .sort-btn:hover, .sort-btn.active {
      background-color: var(--color-primary);
      color: white;
      border-color: var(--color-primary);
    }

    .market-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-5);
    }

    .market-item {
      background-color: var(--color-surface);
      border-radius: var(--radius-xl);
      border: 1px solid var(--color-border);
      overflow: hidden;
      box-shadow: var(--shadow-xs);
      transition: all var(--transition-base);
    }

    .market-item:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .item-image {
      width: 100%;
      height: 140px;
      object-fit: cover;
      background-color: var(--color-bg);
    }

    .item-body {
      padding: var(--space-4);
    }

    .item-name {
      font-family: var(--font-heading);
      font-weight: var(--font-bold);
      font-size: var(--text-lg);
      color: var(--color-text);
      margin-bottom: var(--space-2);
    }

    .item-price {
      font-size: var(--text-xl);
      font-weight: var(--font-extrabold);
      color: var(--color-primary);
      margin-bottom: var(--space-2);
    }

    .item-meta {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: var(--space-4);
    }

    .item-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) var(--space-4);
      border-top: 1px solid var(--color-border);
      background-color: var(--color-surface-alt);
    }

    .listing-id {
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
      color: var(--color-text-muted);
      font-family: monospace;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: var(--space-16);
      color: var(--color-text-muted);
    }

    @media (max-width: 900px) { .market-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .market-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<header class="navbar">
  <div class="container">
    <a href="../../index.html" class="navbar-brand">🌾 FarmConnect</a>
    <a href="dashboard.html" class="btn btn-sm btn-secondary">← Dashboard</a>
  </div>
</header>

<main class="main-content container">
  <div class="page-header">
    <h1>🛒 Marketplace</h1>
    <p>Current crop listings from verified farmers across India. Prices in ₹ per Quintal.</p>
  </div>

  <div class="market-controls">
    <div class="search-bar" style="flex:1;max-width:360px;">
      <span>🔍</span>
      <input type="text" id="market-search" placeholder="Search crops, locations..." oninput="applyFilters()">
    </div>
    <button class="sort-btn" onclick="sortItems('asc')" id="sort-asc">↑ Price: Low→High</button>
    <button class="sort-btn" onclick="sortItems('desc')" id="sort-desc">↓ Price: High→Low</button>
    <span id="result-count" style="font-size:var(--text-sm);color:var(--color-text-muted);margin-left:auto;"></span>
  </div>

  <div class="market-grid" id="market-grid"></div>
</main>

<nav class="bottom-nav">
  <a href="dashboard.html"><span style="font-size:1.25rem;">🏠</span><span>Home</span></a>
  <a href="marketplace.html" class="active"><span style="font-size:1.25rem;">🛒</span><span>Market</span></a>
  <a href="my-orders.html"><span style="font-size:1.25rem;">📦</span><span>Orders</span></a>
  <a href="agreement.html"><span style="font-size:1.25rem;">📝</span><span>Contracts</span></a>
</nav>

<script src="../../js/utils.js"></script>
<script>
  const listings = [
    { id: 'BT023539', name: 'Soybean',   price: 4580, qty: '150.0 MT', location: 'Nanded, MH',    ends: '2024-08-31', img: 'https://images.unsplash.com/photo-1601379327928-bedfaf9da2d0?w=400&q=70' },
    { id: 'BT023538', name: 'Chana Dal', price: 8500, qty: '15.0 MT',  location: 'Salem, TN',     ends: '2024-09-03', img: 'https://images.unsplash.com/photo-1612257999756-3bdc0fa0d8b9?w=400&q=70' },
    { id: 'BT023537', name: 'Maize',     price: 2500, qty: '500.0 MT', location: 'Tilha, UP',     ends: '2024-09-05', img: 'https://images.unsplash.com/photo-1551754655-cd27e38d2076?w=400&q=70' },
    { id: 'BT023536', name: 'Bajra',     price: 2500, qty: '250.0 MT', location: 'Mumbai, MH',    ends: '2024-09-04', img: 'https://images.unsplash.com/photo-1586201375761-83865001e31c?w=400&q=70' },
    { id: 'BT023535', name: 'Cotton',    price: 7000, qty: '300.0 MT', location: 'Surat, GJ',     ends: '2024-09-06', img: 'https://images.unsplash.com/photo-1598300042247-d088f8ab3a91?w=400&q=70' },
    { id: 'BT023534', name: 'Wheat',     price: 4000, qty: '200.0 MT', location: 'Ludhiana, PB',  ends: '2024-09-07', img: 'https://images.unsplash.com/photo-1574323347407-f5e1ad6d020b?w=400&q=70' },
    { id: 'BT023533', name: 'Rice',      price: 6000, qty: '400.0 MT', location: 'Patna, BR',     ends: '2024-09-08', img: 'https://images.unsplash.com/photo-1536304929831-ee1ca9d44906?w=400&q=70' },
    { id: 'BT023532', name: 'Barley',    price: 3500, qty: '100.0 MT', location: 'Jaisalmer, RJ', ends: '2024-09-09', img: 'https://images.unsplash.com/photo-1599420186946-7b6fb4e297f0?w=400&q=70' },
    { id: 'BT023531', name: 'Chickpeas', price: 8000, qty: '200.0 MT', location: 'Pune, MH',      ends: '2024-09-14', img: 'https://images.unsplash.com/photo-1548247416-ec66f4900b2e?w=400&q=70' },
    { id: 'BT023530', name: 'Lentils',   price: 6000, qty: '90.0 MT',  location: 'Karnal, HR',    ends: '2024-09-12', img: 'https://images.unsplash.com/photo-1515543904379-3d757afe72e4?w=400&q=70' },
    { id: 'BT023529', name: 'Corn',      price: 3000, qty: '150.0 MT', location: 'Bellary, KA',   ends: '2024-09-18', img: 'https://images.unsplash.com/photo-1551754655-cd27e38d2076?w=400&q=70' },
    { id: 'BT023528', name: 'Quinoa',    price: 12000,qty: '60.0 MT',  location: 'Kochi, KL',     ends: '2024-09-16', img: 'https://images.unsplash.com/photo-1586201375761-83865001e31c?w=400&q=70' },
  ];

  let currentListings = [...listings];
  let currentSort = null;

  function renderListings(list) {
    const grid = document.getElementById('market-grid');
    document.getElementById('result-count').textContent = `${list.length} listing${list.length !== 1 ? 's' : ''}`;

    if (list.length === 0) {
      grid.innerHTML = '<div class="no-results">🔍 No listings match your search. Try a different term.</div>';
      return;
    }

    grid.innerHTML = list.map(item => `
      <div class="market-item animate-fade-in" data-name="${item.name.toLowerCase()}" data-price="${item.price}">
        <img class="item-image" src="${item.img}" alt="${item.name}" loading="lazy"
             onerror="this.style.background='var(--color-bg)';this.style.display='block';">
        <div class="item-body">
          <div class="item-name">${item.name}</div>
          <div class="item-price">${Utils.formatPrice(item.price)}<span style="font-size:var(--text-sm);font-weight:normal;color:var(--color-text-muted)">/QT</span></div>
          <div class="item-meta">
            <span>📦 Available: ${item.qty}</span>
            <span>📍 ${item.location}</span>
            <span>⏳ Ends: ${Utils.formatDate(item.ends)}</span>
          </div>
          <button class="btn btn-primary btn-sm btn-full" onclick="Utils.showToast('Contact initiated for ${item.name}!', 'success')">
            Contact Farmer
          </button>
        </div>
        <div class="item-footer">
          <span class="listing-id">#${item.id}</span>
          <span class="badge badge-success">Live</span>
        </div>
      </div>
    `).join('');
  }

  function applyFilters() {
    const query = document.getElementById('market-search').value.toLowerCase().trim();
    let filtered = listings;
    if (query) {
      filtered = listings.filter(item =>
        item.name.toLowerCase().includes(query) ||
        item.location.toLowerCase().includes(query)
      );
    }
    if (currentSort === 'asc') filtered.sort((a, b) => a.price - b.price);
    if (currentSort === 'desc') filtered.sort((a, b) => b.price - a.price);
    currentListings = filtered;
    renderListings(filtered);
  }

  function sortItems(direction) {
    currentSort = direction;
    document.getElementById('sort-asc').classList.toggle('active', direction === 'asc');
    document.getElementById('sort-desc').classList.toggle('active', direction === 'desc');
    applyFilters();
  }

  renderListings(listings);
</script>
</body>
</html>
