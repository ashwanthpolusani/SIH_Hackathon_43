<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="theme-color" content="#2E7D32">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="My Traders — manage and respond to trader contract requests on FarmConnect.">
  <title>My Traders – FarmConnect</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌾</text></svg>">
  <link rel="stylesheet" href="../../css/global.css">
  <style>
    body { background-color: var(--color-bg); padding-bottom: var(--space-10); }
    .trader-card {
      background-color: var(--color-surface);
      border-radius: var(--radius-xl);
      border: 1px solid var(--color-border);
      padding: var(--space-5) var(--space-6);
      margin-bottom: var(--space-4);
      display: flex;
      align-items: center;
      gap: var(--space-4);
      box-shadow: var(--shadow-xs);
      transition: box-shadow var(--transition-fast);
    }
    .trader-card:hover { box-shadow: var(--shadow-sm); }
    .trader-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-accent-light), var(--color-accent));
      color: var(--color-accent-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-heading);
      font-weight: var(--font-bold);
      font-size: var(--text-lg);
      flex-shrink: 0;
    }
    .trader-info { flex: 1; }
    .trader-name { font-weight: var(--font-semibold); color: var(--color-text); font-size: var(--text-base); }
    .trader-meta { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: 3px; }
    .trader-meta span { margin-right: var(--space-3); }
    .trader-actions { display: flex; gap: var(--space-2); flex-shrink: 0; }
    .empty-state {
      text-align: center;
      padding: var(--space-16) var(--space-6);
      color: var(--color-text-muted);
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: var(--space-4); display: block; }
  </style>
</head>
<body>
<header class="navbar">
  <div class="container">
    <a href="../../index.html" class="navbar-brand">🌾 FarmConnect</a>
    <a href="dashboard.html" class="btn btn-sm btn-secondary">← Dashboard</a>
  </div>
</header>

<main class="main-content container">
  <div class="page-header flex items-center justify-between">
    <div>
      <h1>🤝 My Traders</h1>
      <p>Review and respond to trader contract requests sent to you.</p>
    </div>
    <div class="search-bar" style="max-width:280px;">
      <span>🔍</span>
      <input type="text" id="search-traders" placeholder="Search traders..." oninput="filterTraders(this.value)">
    </div>
  </div>

  <div id="traders-list">
    <!-- Populated by JS -->
  </div>
</main>

<script src="../../js/auth.js"></script>
<script src="../../js/utils.js"></script>
<script>
  const traderRequests = [
    { id: 'T001', name: 'Alice Johnson',    product: 'Corn',  requirement: '50 tons', location: 'Telangana',     initial: 'A' },
    { id: 'T002', name: 'Michael Smith',    product: 'Wheat', requirement: '30 tons', location: 'Andhra Pradesh', initial: 'M' },
    { id: 'T003', name: 'Sarah Brown',      product: 'Rice',  requirement: '40 tons', location: 'Karnataka',     initial: 'S' },
    { id: 'T004', name: 'Rajesh Kumar',     product: 'Corn',  requirement: '25 tons', location: 'Maharashtra',   initial: 'R' },
    { id: 'T005', name: 'Priya Nair',       product: 'Soybean', requirement: '60 tons', location: 'Kerala',    initial: 'P' },
  ];

  let visibleTraders = [...traderRequests];

  function renderTraders(traders) {
    const list = document.getElementById('traders-list');
    if (traders.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">📭</span>
          <p>No trader requests found matching your search.</p>
        </div>`;
      return;
    }
    list.innerHTML = traders.map(t => `
      <div class="trader-card animate-fade-in" id="trader-${t.id}">
        <div class="trader-avatar">${t.initial}</div>
        <div class="trader-info">
          <div class="trader-name">${t.name}</div>
          <div class="trader-meta">
            <span>📦 ${t.product}</span>
            <span>⚖️ ${t.requirement}</span>
            <span>📍 ${t.location}</span>
          </div>
        </div>
        <div class="trader-actions">
          <a href="agreement.html" class="btn btn-sm btn-primary" onclick="acceptTrader('${t.id}', '${t.name}')">Accept</a>
          <button class="btn btn-sm btn-danger" onclick="denyTrader('${t.id}', '${t.name}')">Deny</button>
        </div>
      </div>
    `).join('');
  }

  function filterTraders(query) {
    if (!query.trim()) { visibleTraders = [...traderRequests]; renderTraders(visibleTraders); return; }
    const q = query.toLowerCase();
    visibleTraders = traderRequests.filter(t =>
      t.name.toLowerCase().includes(q) ||
      t.product.toLowerCase().includes(q) ||
      t.location.toLowerCase().includes(q)
    );
    renderTraders(visibleTraders);
  }

  function acceptTrader(traderId, traderName) {
    Utils.showToast(`✅ Contract initiated with ${traderName}.`, 'success');
  }

  function denyTrader(traderId, traderName) {
    const card = document.getElementById(`trader-${traderId}`);
    card.style.transition = 'all 0.3s ease';
    card.style.opacity = '0';
    card.style.transform = 'translateX(20px)';
    setTimeout(() => {
      card.remove();
      visibleTraders = visibleTraders.filter(t => t.id !== traderId);
      if (visibleTraders.length === 0) renderTraders([]);
    }, 300);
    Utils.showToast(`Request from ${traderName} dismissed.`, 'info');
  }

  renderTraders(visibleTraders);
</script>
</body>
</html>
